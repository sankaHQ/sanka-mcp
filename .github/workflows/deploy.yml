name: Deploy

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      expected_sha:
        description: 'Exact main commit SHA expected by the upstream Sanka deploy.'
        required: false
        type: string
      trigger_id:
        description: 'Optional upstream Sanka deploy identifier for audit/log correlation.'
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mcp.sanka.com/mcp
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'release'

      - uses: actions/checkout@v6
        if: github.event_name == 'release'
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Validate workflow dispatch target
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.expected_sha != ''
        env:
          EXPECTED_SHA: ${{ github.event.inputs.expected_sha }}
          TRIGGER_ID: ${{ github.event.inputs.trigger_id }}
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "sanka-mcp deploy expected_sha mismatch."
            echo "expected_sha=${EXPECTED_SHA}"
            echo "actual_sha=${actual_sha}"
            exit 1
          fi
          {
            echo "## sanka-mcp Deploy Target"
            echo ""
            echo "- Expected SHA: \`${EXPECTED_SHA}\`"
            echo "- Actual SHA: \`${actual_sha}\`"
            if [ -n "${TRIGGER_ID:-}" ]; then
              echo "- Trigger ID: \`${TRIGGER_ID}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure release tag points to main history
        if: github.event_name == 'release'
        run: |
          git fetch origin main --depth=1
          tag_sha="$(git rev-parse HEAD)"
          main_sha="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$tag_sha" "$main_sha"; then
            echo "Production release tag must point to a commit on main history."
            echo "tag_sha=$tag_sha"
            echo "main_sha=$main_sha"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.30.1'

      - name: Bootstrap
        env:
          SKIP_BREW: '1'
        run: ./scripts/bootstrap

      - name: Build
        run: ./scripts/build

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only -c fly.toml --strategy immediate --ha=false
