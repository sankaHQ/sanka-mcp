name: Staging Build and Deploy (Fly)

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://sanka-mcp-staging.fly.dev/mcp
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Bootstrap
        env:
          SKIP_BREW: '1'
        run: ./scripts/bootstrap

      - name: Build
        run: ./scripts/build

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_API_TOKEN || secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only -c fly.staging.toml --app sanka-mcp-staging
