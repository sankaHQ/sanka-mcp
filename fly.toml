app = "sanka-mcp"
primary_region = "nrt"

[build]
  dockerfile = "packages/mcp-server/Dockerfile"

[env]
  MCP_SERVER_AUTHORIZATION_SERVER_URL = "https://app.sanka.com"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "get"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
