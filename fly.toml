app = "sanka-mcp"
primary_region = "nrt"

[build]
  dockerfile = "packages/mcp-server/Dockerfile"

[env]
  LOG_ENV = "production"
  LOG_FORMAT = "json"
  LOG_LEVEL = "INFO"
  LOG_SERVICE_NAME = "sanka-mcp"
  LOG_SUPPRESS_FRAMEWORK_LOGS = "True"
  LOG_VERBOSITY = "standard"
  LOG_VERSION = "0.0.1"
  MCP_SERVER_AUTHORIZATION_SERVER_URL = "https://app.sanka.com"
  MCP_SERVER_INTERNAL_AUTHORIZATION_SERVER_URL = "https://api.prv.sanka.com"
  MCP_SERVER_RESOURCE_URL = "https://mcp.sanka.com/mcp"
  MCP_SERVER_STREAMABLE_AUTH_FALLBACK = "tool_result"
  NODE_ENV = "production"
  PORT = "8080"
  SANKA_BASE_URL = "https://sanka-api.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "get"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
